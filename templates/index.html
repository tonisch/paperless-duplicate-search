<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Paperless Duplikate</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
  <div class="max-w-6xl mx-auto py-8 px-4">
    <header class="mb-8 flex items-center justify-between gap-4">
      <div>
        <h1 id="title" class="text-3xl font-bold tracking-tight">Paperless Duplikate</h1>
        <p id="subtitle" class="text-slate-400 mt-1">
          Finde und bestätige Duplikate mit Vorschau, bevor du sie löschst.
        </p>
      </div>
      <div class="flex items-center gap-3">
        <select id="languageSelect" class="bg-slate-900 border border-slate-700 text-slate-100 text-xs rounded px-2 py-1">
          <option value="auto">🌐 Auto</option>
          <option value="de">Deutsch</option>
          <option value="en">English</option>
        </select>
        <button id="reloadBtn" class="px-4 py-2 rounded-md bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-semibold text-sm">
          Neu laden
        </button>
      </div>
    </header>

    <div id="status" class="mb-2 text-sm text-slate-300">Lade Duplikate...</div>

    <div class="flex flex-wrap items-center gap-3 mb-2">
      <div class="text-xs text-slate-400 flex items-center gap-2">
        <span id="filterLabel">Filter:</span>
        <select id="similarityFilter" class="bg-slate-900 border border-slate-700 text-slate-100 text-xs rounded px-2 py-1">
          <option value="all" data-i18n="filter_all">Alle</option>
          <option value="100" data-i18n="filter_100">Nur 100%</option>
          <option value="ge95" data-i18n="filter_ge95">≥ 95%</option>
          <option value="ge90" data-i18n="filter_ge90">≥ 90%</option>
        </select>
      </div>
      <label class="flex items-center gap-1 text-xs text-slate-400">
        <input type="checkbox" id="selectAllVisible" class="rounded border-slate-600 bg-slate-900" />
        <span id="selectAllVisibleLabel">Alle sichtbaren auswählen</span>
      </label>
      <button id="deleteSelectedBtn" class="px-3 py-1.5 rounded-md bg-red-500/90 hover:bg-red-400 text-xs font-semibold text-slate-900">
        Ausgewählte löschen
      </button>
      <button id="deleteAllPerfectBtn" class="px-3 py-1.5 rounded-md bg-red-700/90 hover:bg-red-600 text-xs font-semibold text-slate-50">
        Alle 100%-Duplikate bereinigen
      </button>
    </div>

    <section class="mb-6">
      <h2 id="statsTitle" class="text-sm font-semibold text-slate-200 mb-2">Statistik</h2>
      <div class="bg-slate-900/60 border border-slate-800 rounded-xl p-3">
        <canvas id="similarityChart" class="w-full h-40"></canvas>
      </div>
    </section>

    <div id="pairsContainer" class="space-y-4"></div>
  </div>

  <script>
    // --- I18N ---
    const I18N = {
      de: {
        title: "Paperless Duplikate",
        subtitle: "Finde und bestätige Duplikate mit Vorschau, bevor du sie löschst.",
        filterLabel: "Filter:",
        filter_all: "Alle",
        filter_100: "Nur 100%",
        filter_ge95: "≥ 95%",
        filter_ge90: "≥ 90%",
        selectAllVisible: "Alle sichtbaren auswählen",
        deleteSelected: "Ausgewählte löschen",
        deleteAllPerfect: "Alle 100%-Duplikate bereinigen",
        statsTitle: "Statistik",
        loading: "Lade Duplikate...",
        noneForFilter: "Keine Duplikate für diesen Filter.",
        noneFound: "Keine Duplikate gefunden.",
        statusSummary: (total, count100) =>
          `${total} Duplikat-Paar(e) gefunden – 100%: ${count100}`,
        confirmDeleteRight: (id) =>
          `Dokument ID ${id} wirklich löschen (linkes bleibt erhalten)?`,
        confirmDeleteLeft: (id) =>
          `Dokument ID ${id} wirklich löschen (rechtes bleibt erhalten)?`,
        confirmDeleteSelected: (count) =>
          `${count} ausgewählte Dokument(e) wirklich löschen?`,
        errorLoadDuplicates: "Fehler beim Laden der Duplikate",
        errorDelete: "Fehler beim Löschen",
        errorBulkDelete: "Fehler beim Löschen der Auswahl",
        noSelection: "Keine Dokumente ausgewählt.",
        bulkStarted: "Bereinigung gestartet...",
        bulkProgress: (current, total, deleted) =>
          `Bereinige 100%-Duplikate… Gruppe ${current} / ${total}, gelöscht: ${deleted}`,
        bulkDoneAlert: (deleted, groups) =>
          `Fertig. Gelöscht: ${deleted} Dokument(e) in ${groups} Duplikat-Gruppen.`,
        bulkStatusError: "Fehler beim Lesen des Fortschritts",
        chartLabel: "Anzahl Paare",
        chooseLabel: "wählen",
        language_auto: "🌐 Auto",
        language_de: "Deutsch",
        language_en: "English",
      },
      en: {
        title: "Paperless Duplicates",
        subtitle: "Find and confirm duplicates with previews before deleting.",
        filterLabel: "Filter:",
        filter_all: "All",
        filter_100: "Only 100%",
        filter_ge95: "≥ 95%",
        filter_ge90: "≥ 90%",
        selectAllVisible: "Select all visible",
        deleteSelected: "Delete selected",
        deleteAllPerfect: "Clean up all 100% duplicates",
        statsTitle: "Statistics",
        loading: "Loading duplicates...",
        noneForFilter: "No duplicates for this filter.",
        noneFound: "No duplicates found.",
        statusSummary: (total, count100) =>
          `${total} duplicate pair(s) found – 100%: ${count100}`,
        confirmDeleteRight: (id) =>
          `Really delete document ID ${id} (left will be kept)?`,
        confirmDeleteLeft: (id) =>
          `Really delete document ID ${id} (right will be kept)?`,
        confirmDeleteSelected: (count) =>
          `Really delete ${count} selected document(s)?`,
        errorLoadDuplicates: "Error loading duplicates",
        errorDelete: "Error deleting document",
        errorBulkDelete: "Error deleting selection",
        noSelection: "No documents selected.",
        bulkStarted: "Cleanup started...",
        bulkProgress: (current, total, deleted) =>
          `Cleaning 100% duplicates… group ${current} / ${total}, deleted: ${deleted}`,
        bulkDoneAlert: (deleted, groups) =>
          `Done. Deleted ${deleted} document(s) in ${groups} duplicate groups.`,
        bulkStatusError: "Error reading cleanup progress",
        chartLabel: "Number of pairs",
        chooseLabel: "select",
        language_auto: "🌐 Auto",
        language_de: "Deutsch",
        language_en: "English",
      },
    };

    let currentLang = "de";

    function detectLanguage() {
      const nav = navigator.language || navigator.userLanguage || "en";
      if (nav.toLowerCase().startsWith("de")) return "de";
      return "en";
    }

    function applyTranslations() {
      const t = I18N[currentLang];
      document.documentElement.lang = currentLang;

      document.getElementById("title").textContent = t.title;
      document.getElementById("subtitle").textContent = t.subtitle;
      document.getElementById("filterLabel").textContent = t.filterLabel;
      document.getElementById("statsTitle").textContent = t.statsTitle;
      document.getElementById("selectAllVisibleLabel").textContent =
        t.selectAllVisible;
      document.getElementById("reloadBtn").textContent =
        currentLang === "de" ? "Neu laden" : "Reload";

      // Filter options
      document
        .querySelector('#similarityFilter option[value="all"]')
        .textContent = t.filter_all;
      document
        .querySelector('#similarityFilter option[value="100"]')
        .textContent = t.filter_100;
      document
        .querySelector('#similarityFilter option[value="ge95"]')
        .textContent = t.filter_ge95;
      document
        .querySelector('#similarityFilter option[value="ge90"]')
        .textContent = t.filter_ge90;

      document.getElementById("deleteSelectedBtn").textContent =
        t.deleteSelected;
      document.getElementById("deleteAllPerfectBtn").textContent =
        t.deleteAllPerfect;

      // Language select labels
      const langSelect = document.getElementById("languageSelect");
      langSelect.querySelector('option[value="auto"]').textContent =
        t.language_auto;
      langSelect.querySelector('option[value="de"]').textContent =
        t.language_de;
      langSelect.querySelector('option[value="en"]').textContent =
        t.language_en;
    }

    const statusEl = document.getElementById("status");
    const container = document.getElementById("pairsContainer");
    const reloadBtn = document.getElementById("reloadBtn");
    const filterSelect = document.getElementById("similarityFilter");
    const deleteAllPerfectBtn = document.getElementById("deleteAllPerfectBtn");
    const selectAllVisibleCheckbox = document.getElementById("selectAllVisible");
    const deleteSelectedBtn = document.getElementById("deleteSelectedBtn");
    const languageSelect = document.getElementById("languageSelect");

    let allPairs = [];
    let selectedDocIds = new Set();
    let similarityChart = null;

    function t() {
      return I18N[currentLang];
    }

    function passesFilter(pair) {
      const v = filterSelect.value;
      if (v === "all") return true;
      const s = pair.similarity;
      if (v === "100") return Math.round(s) === 100;
      if (v === "ge95") return s >= 95;
      if (v === "ge90") return s >= 90;
      return true;
    }

    function formatCorrespondent(c) {
      if (!c) return currentLang === "de" ? "(kein Korrespondent)" : "(no correspondent)";
      if (typeof c === "string" || typeof c === "number")
        return (currentLang === "de" ? "Korrespondent #" : "Correspondent #") + c;
      if (c.name) return c.name;
      if (c.id)
        return (currentLang === "de" ? "Korrespondent #" : "Correspondent #") + c.id;
      return currentLang === "de" ? "(kein Korrespondent)" : "(no correspondent)";
    }

    function formatTags(tags) {
      if (!tags || tags.length === 0)
        return currentLang === "de" ? "Keine Tags" : "No tags";
      const names = tags
        .map((t) => {
          if (typeof t === "string" || typeof t === "number") return "#" + t;
          if (t.name) return t.name;
          if (t.slug) return t.slug;
          if (t.id) return "#" + t.id;
          return "";
        })
        .filter(Boolean);
      if (!names.length) return currentLang === "de" ? "Keine Tags" : "No tags";
      return names.join(", ");
    }

    function renderPairs() {
      container.innerHTML = "";
      const visiblePairs = allPairs.filter(passesFilter);
      if (!visiblePairs.length) {
        const msg = document.createElement("div");
        msg.className = "text-sm text-slate-400";
        msg.textContent = t().noneForFilter;
        container.appendChild(msg);
        return;
      }

      for (const pair of visiblePairs) {
        const aId = pair.a.id;
        const bId = pair.b.id;
        const card = document.createElement("div");
        card.className = "bg-slate-900/60 border border-slate-800 rounded-xl p-4 shadow-lg";

        const header = document.createElement("div");
        header.className = "flex items-center justify-between mb-4 gap-2";

        const leftInfo = document.createElement("div");
        leftInfo.innerHTML = `
          <div class="text-xs uppercase tracking-wide text-slate-400">${pair.reason}</div>
          <div class="text-lg font-semibold mt-1">
            ${currentLang === "de" ? "Ähnlichkeit" : "Similarity"}:
            <span class="text-emerald-400">${pair.similarity.toFixed(1)}%</span>
          </div>
        `;

        const rightInfo = document.createElement("div");
        rightInfo.className = "flex items-center gap-3 text-xs text-slate-400";
        rightInfo.textContent =
          (currentLang === "de" ? "ID " : "ID ") + aId + " ↔ ID " + bId;

        header.appendChild(leftInfo);
        header.appendChild(rightInfo);

        const previewWrapper = document.createElement("div");
        previewWrapper.className = "grid grid-cols-1 md:grid-cols-2 gap-4 mb-4";

        const leftCol = document.createElement("div");
        leftCol.innerHTML = `
          <div class="flex items-center justify-between gap-2 mb-1">
            <div class="text-sm font-medium truncate">${pair.a.title || (currentLang === "de" ? "(kein Titel)" : "(no title)")}</div>
            <label class="flex items-center gap-1 text-xs text-slate-400 whitespace-nowrap">
              <input type="checkbox" class="doc-checkbox" data-doc-id="${aId}" />
              <span>${t().chooseLabel}</span>
            </label>
          </div>
          <div class="text-xs text-slate-400 mb-1">ID ${aId}</div>
          <div class="text-xs text-slate-400 mb-1">${currentLang === "de" ? "Korrespondent" : "Correspondent"}: ${formatCorrespondent(pair.a.correspondent)}</div>
          <div class="text-xs text-slate-400 mb-2">Tags: ${formatTags(pair.a.tags)}</div>
          <div class="bg-slate-950/60 border border-slate-800 rounded-lg overflow-hidden flex items-center justify-center h-56">
            <iframe src="${pair.a.preview_url}" class="w-full h-full scale-75 origin-top" loading="lazy"></iframe>
          </div>
        `;

        const rightCol = document.createElement("div");
        rightCol.innerHTML = `
          <div class="flex items-center justify-between gap-2 mb-1">
            <div class="text-sm font-medium truncate">${pair.b.title || (currentLang === "de" ? "(kein Titel)" : "(no title)")}</div>
            <label class="flex items-center gap-1 text-xs text-slate-400 whitespace-nowrap">
              <input type="checkbox" class="doc-checkbox" data-doc-id="${bId}" />
              <span>${t().chooseLabel}</span>
            </label>
          </div>
          <div class="text-xs text-slate-400 mb-1">ID ${bId}</div>
          <div class="text-xs text-slate-400 mb-1">${currentLang === "de" ? "Korrespondent" : "Correspondent"}: ${formatCorrespondent(pair.b.correspondent)}</div>
          <div class="text-xs text-slate-400 mb-2">Tags: ${formatTags(pair.b.tags)}</div>
          <div class="bg-slate-950/60 border border-slate-800 rounded-lg overflow-hidden flex items-center justify-center h-56">
            <iframe src="${pair.b.preview_url}" class="w-full h-full scale-75 origin-top" loading="lazy"></iframe>
          </div>
        `;

        previewWrapper.appendChild(leftCol);
        previewWrapper.appendChild(rightCol);

        const actions = document.createElement("div");
        actions.className = "flex flex-wrap gap-2 justify-end";

        const keepADeleteB = document.createElement("button");
        keepADeleteB.className =
          "px-3 py-2 rounded-md bg-red-500 hover:bg-red-400 text-slate-900 text-sm font-semibold";
        keepADeleteB.textContent =
          (currentLang === "de" ? "Rechtes (ID " : "Right (ID ") +
          bId +
          (currentLang === "de" ? ") löschen" : ") delete");
        keepADeleteB.onclick = async () => {
          if (!confirm(t().confirmDeleteRight(bId))) return;
          await deleteDoc(aId, bId, card);
        };

        const keepBDeleteA = document.createElement("button");
        keepBDeleteA.className =
          "px-3 py-2 rounded-md bg-orange-500 hover:bg-orange-400 text-slate-900 text-sm font-semibold";
        keepBDeleteA.textContent =
          (currentLang === "de" ? "Linkes (ID " : "Left (ID ") +
          aId +
          (currentLang === "de" ? ") löschen" : ") delete");
        keepBDeleteA.onclick = async () => {
          if (!confirm(t().confirmDeleteLeft(aId))) return;
          await deleteDoc(bId, aId, card);
        };

        const skipBtn = document.createElement("button");
        skipBtn.className =
          "px-3 py-2 rounded-md border border-slate-600 text-slate-200 text-sm";
        skipBtn.textContent =
          currentLang === "de" ? "Paar überspringen" : "Skip pair";
        skipBtn.onclick = () => {
          card.remove();
        };

        actions.appendChild(keepADeleteB);
        actions.appendChild(keepBDeleteA);
        actions.appendChild(skipBtn);

        card.appendChild(header);
        card.appendChild(previewWrapper);
        card.appendChild(actions);

        container.appendChild(card);

        // Checkbox-Status setzen und Listener
        card.querySelectorAll(".doc-checkbox").forEach((cb) => {
          const id = parseInt(cb.getAttribute("data-doc-id"), 10);
          if (selectedDocIds.has(id)) {
            cb.checked = true;
          }
          cb.addEventListener("change", (e) => {
            if (e.target.checked) {
              selectedDocIds.add(id);
            } else {
              selectedDocIds.delete(id);
              selectAllVisibleCheckbox.checked = false;
            }
          });
        });
      }
    }

    function updateChart(similarityCounts) {
      const ctx = document.getElementById("similarityChart").getContext("2d");
      const entries = Object.entries(similarityCounts || {}).sort(
        (a, b) => parseInt(a[0], 10) - parseInt(b[0], 10)
      );
      const labels = entries.map(([k]) => k + "%");
      const values = entries.map(([, v]) => v);

      if (similarityChart) {
        similarityChart.destroy();
      }

      similarityChart = new Chart(ctx, {
        type: "bar",
        data: {
          labels,
          datasets: [
            {
              label: t().chartLabel,
              data: values,
              backgroundColor: "rgba(16, 185, 129, 0.6)",
            },
          ],
        },
        options: {
          responsive: true,
          plugins: {
            legend: { display: false },
          },
          scales: {
            x: {
              ticks: { color: "#94a3b8", font: { size: 10 } },
              grid: { display: false },
            },
            y: {
              ticks: { color: "#94a3b8", precision: 0 },
              grid: { color: "rgba(148, 163, 184, 0.2)" },
            },
          },
        },
      });
    }

    async function loadPairs() {
      statusEl.textContent = t().loading;
      container.innerHTML = "";
      try {
        const resp = await fetch("/api/duplicates");
        if (!resp.ok) {
          throw new Error("HTTP " + resp.status);
        }
        const data = await resp.json();
        const pairs = data.pairs || [];

        if (pairs.length === 0) {
          statusEl.textContent = t().noneFound;
          allPairs = [];
          updateChart({});
          renderPairs();
          return;
        }

        const total = data.total_pairs ?? pairs.length;
        const counts = data.similarity_counts || {};
        const count100 = counts["100"] || counts[100] || 0;
        statusEl.textContent = t().statusSummary(total, count100);

        allPairs = pairs;
        updateChart(counts);
        renderPairs();
      } catch (err) {
        console.error(err);
        statusEl.textContent = `${t().errorLoadDuplicates}: ${err}`;
      }
    }

    async function deleteDoc(keepId, removeId, cardElement) {
      try {
        const resp = await fetch("/api/delete", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ keep_id: keepId, remove_id: removeId }),
        });
        if (!resp.ok) {
          const text = await resp.text();
          alert(`${t().errorDelete}: ${text}`);
          return;
        }
        const idsToRemove = [keepId, removeId];
        idsToRemove.forEach((id) => selectedDocIds.delete(id));
        cardElement.remove();
      } catch (err) {
        console.error(err);
        alert(`${t().errorDelete}: ${err}`);
      }
    }

    async function deleteSelected() {
      const ids = Array.from(selectedDocIds);
      if (!ids.length) {
        alert(t().noSelection);
        return;
      }
      if (!confirm(t().confirmDeleteSelected(ids.length))) {
        return;
      }
      try {
        deleteSelectedBtn.disabled = true;
        deleteSelectedBtn.textContent =
          currentLang === "de" ? "Lösche Auswahl…" : "Deleting selection…";
        const resp = await fetch("/api/bulk-delete", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ ids }),
        });
        if (!resp.ok) {
          const text = await resp.text();
          alert(`${t().errorBulkDelete}: ${text}`);
          return;
        }
        const data = await resp.json();
        const deleted = data.deleted_ids || ids;
        deleted.forEach((id) => selectedDocIds.delete(id));
        await loadPairs();
      } catch (err) {
        console.error(err);
        alert(`${t().errorBulkDelete}: ${err}`);
      } finally {
        deleteSelectedBtn.disabled = false;
        deleteSelectedBtn.textContent = t().deleteSelected;
        selectAllVisibleCheckbox.checked = false;
      }
    }

    async function deleteAllPerfect() {
      if (
        !confirm(
          currentLang === "de"
            ? "Alle 100%-Duplikat-Gruppen automatisch bereinigen? Es bleibt jeweils ein Dokument pro Gruppe übrig."
            : "Automatically clean all 100% duplicate groups? One document per group will be kept."
        )
      ) {
        return;
      }
      try {
        deleteAllPerfectBtn.disabled = true;
        deleteAllPerfectBtn.textContent = t().bulkStarted;
        const resp = await fetch("/api/delete-perfect-duplicates", {
          method: "POST",
        });
        if (!resp.ok) {
          const text = await resp.text();
          alert(`${t().errorBulkDelete}: ${text}`);
          deleteAllPerfectBtn.disabled = false;
          deleteAllPerfectBtn.textContent = t().deleteAllPerfect;
          return;
        }

        // Polling für Fortschritt
        async function pollStatus() {
          try {
            const sResp = await fetch("/api/delete-perfect-duplicates/status");
            if (!sResp.ok) {
              throw new Error("HTTP " + sResp.status);
            }
            const s = await sResp.json();
            if (s.running) {
              const current = s.current_group || 0;
              const total = s.total_groups || 0;
              const deleted = s.deleted_count || 0;
              statusEl.textContent = t().bulkProgress(current, total, deleted);
              deleteAllPerfectBtn.textContent =
                currentLang === "de"
                  ? "Bereinige 100%-Duplikate…"
                  : "Cleaning 100% duplicates…";
              setTimeout(pollStatus, 1000);
            } else {
              const result = s.last_result || {};
              const deleted = result.deleted_count ?? s.deleted_count ?? 0;
              const groups = result.groups_processed ?? 0;
              alert(t().bulkDoneAlert(deleted, groups));
              deleteAllPerfectBtn.textContent = t().deleteAllPerfect;
              deleteAllPerfectBtn.disabled = false;
              await loadPairs();
            }
          } catch (err) {
            console.error(err);
            alert(`${t().bulkStatusError}: ${err}`);
            deleteAllPerfectBtn.textContent = t().deleteAllPerfect;
            deleteAllPerfectBtn.disabled = false;
          }
        }

        pollStatus();
      } catch (err) {
        console.error(err);
        alert(`${t().errorBulkDelete}: ${err}`);
        deleteAllPerfectBtn.disabled = false;
        deleteAllPerfectBtn.textContent = t().deleteAllPerfect;
      }
    }

    // Event-Listener
    reloadBtn.addEventListener("click", loadPairs);
    filterSelect.addEventListener("change", renderPairs);
    deleteAllPerfectBtn.addEventListener("click", deleteAllPerfect);
    deleteSelectedBtn.addEventListener("click", deleteSelected);
    selectAllVisibleCheckbox.addEventListener("change", (e) => {
      const visiblePairs = allPairs.filter(passesFilter);
      const shouldSelect = e.target.checked;
      container.querySelectorAll(".doc-checkbox").forEach((cb) => {
        const id = parseInt(cb.getAttribute("data-doc-id"), 10);
        cb.checked = shouldSelect;
        if (shouldSelect) {
          selectedDocIds.add(id);
        } else {
          selectedDocIds.delete(id);
        }
      });
    });

    languageSelect.addEventListener("change", () => {
      const value = languageSelect.value;
      if (value === "auto") {
        currentLang = detectLanguage();
      } else {
        currentLang = value;
      }
      applyTranslations();
      renderPairs();
    });

    // Initial language setup
    currentLang = detectLanguage();
    languageSelect.value = "auto";
    applyTranslations();
    loadPairs();
  </script>
</body>
</html>
